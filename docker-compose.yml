version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: manus-postgres
    environment:
      POSTGRES_DB: manus
      POSTGRES_USER: manus
      POSTGRES_PASSWORD: manus123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "manus"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: manus-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
